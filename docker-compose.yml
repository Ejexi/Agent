services:
  # ==========================================
  # Core DevSecOps Agent
  # ==========================================
  agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: duckops_agent
    
    # Required for interactive CLI apps inside Docker equivalent to `docker run -it`
    stdin_open: true 
    tty: true

    # Inject your environment variables here
    # For production, it's better to use a .env file instead:
    # env_file:
    #   - .env
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - LMSTUDIO_API_KEY=${LMSTUDIO_API_KEY:-}
      
      # For connecting to local LMStudio outside docker, we need host network access
      # So we override the base_url in compose to point to the host machine
      # (host.docker.internal works out-of-the-box on Docker Desktop for Windows/Mac)
      - AGENT_LLM_LMSTUDIO_BASE_URL=http://host.docker.internal:1234/v1

    # Mount configs if you want persistent duckops settings across reboots
    volumes:
      - ./.duckops:/app/.duckops
      - ./config.yaml:/app/config.yaml:ro # Mount base config as Read-Only

    restart: unless-stopped
    depends_on:
      - rabbitmq
      - postgres
      - elasticsearch
      - pgvector

  # ==========================================
  # Infrastructure Dependencies
  # ==========================================
  rabbitmq:
    image: rabbitmq:3-management
    container_name: duckops_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    restart: unless-stopped

  postgres:
    image: postgres:15
    container_name: duckops_postgres
    environment:
      POSTGRES_DB: scanner_db
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    restart: unless-stopped

  elasticsearch:
    image: elasticsearch:8.11.0
    container_name: duckops_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    restart: unless-stopped

  pgvector:
    image: pgvector/pgvector:pg15
    container_name: duckops_pgvector
    environment:
      POSTGRES_DB: embeddings_db
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432" # Notice: Port 5433 to avoid conflict with standard postgres
    restart: unless-stopped