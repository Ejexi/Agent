# ================================================
# DuckOps Agent — Client-Side Docker Compose
# ================================================
# This is the ONLY compose file the end user needs.
# The agent connects to the DuckOps server via API.
#
# Usage:
#   1. Copy .env.example to .env and fill in your keys
#   2. docker compose up -d
#   3. docker compose exec agent ./agent
# ================================================

services:
  agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: duckops_agent
    stdin_open: true
    tty: true
    environment:
      # ── Server Connection ──────────────────────────
      - DUCKOPS_SERVER_URL=${DUCKOPS_SERVER_URL:-http://localhost:8080}
      - DUCKOPS_API_KEY=${DUCKOPS_API_KEY:-}

      # ── LLM Providers (for local intent parsing) ───
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - LMSTUDIO_API_KEY=${LMSTUDIO_API_KEY:-}
      - AGENT_LLM_LMSTUDIO_BASE_URL=http://host.docker.internal:1234/v1
    volumes:
      - ./.duckops:/app/.duckops
      - ./config.yaml:/app/config.yaml:ro
      - scan_workspace:/workspace
    restart: unless-stopped

volumes:
  scan_workspace: